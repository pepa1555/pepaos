name: Build Pepa OS ISO

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install archiso and dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm archiso mkinitcpio squashfs-tools dosfstools mtools libisoburn

      - name: Make scripts executable
        run: chmod +x archlive/airootfs/root/customize_airootfs.sh archlive/airootfs/usr/local/bin/pepaos-welcome archlive/airootfs/usr/local/bin/pepaos-installer

      - name: Build ISO
        run: mkarchiso -v -w /work -o /output archlive

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: pepaos-iso
          path: /output/*.iso
          if-no-files-found: error
