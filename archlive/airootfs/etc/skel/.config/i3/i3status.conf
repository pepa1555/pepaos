# Pepa OS - i3status configuration

general {
    colors = true
    interval = 5
    color_good = "#00d4aa"
    color_degraded = "#f9e2af"
    color_bad = "#f38ba8"
}

order += "ipv6"
order += "wireless _first_"
order += "ethernet _first_"
order += "battery all"
order += "cpu_temperature 0"
order += "load"
order += "tztime local"

wireless _first_ {
    format_up = "п‡«  %essid (%quality)"
    format_down = "п‡«  down"
}

ethernet _first_ {
    format_up = "п›ї  %ip"
    format_down = "п›ї  down"
}

battery all {
    format = "п‰Ђ  %percentage"
    format_down = "п‰„  no battery"
    low_threshold = 20
    threshold_type = percentage
}

cpu_temperature 0 {
    format = "п‹‰  %degreesВ°C"
    path = "/sys/devices/platform/coretemp.0/hwmon/hwmon*/temp1_input"
}

load {
    format = "п‚®  %1min"
}

tztime local {
    format = "пЂ—  %Y-%m-%d %H:%M:%S"
}

volume master {
    format = "пЂЁ  %volume"
    format_muted = "пЂ¦  muted"
    device = "default"
    mixer = "Master"
    mixer_idx = 0
}
